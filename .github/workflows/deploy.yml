name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: aihcn-website
          directory: build
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
           # 不需要配置build command和output directory，因为是静态网站

      - name: Deployment Status
        run: |
          echo "🎉 部署成功！"
          echo "🌐 访问地址: https://aihcn.com"
          echo "📢 临时域名: https://aihcn-website.pages.dev"
          echo ""
          echo "📊 网站信息:"
          echo "   - 文章数量: $(find build/news/*.html 2>/dev/null | wc -l)"
          echo "   - 主页存在: $([ -f build/index.html ] && echo '✅' || echo '❌')"
          echo "   - 404页面: $([ -f build/404.html ] && echo '✅' || echo '❌')"
