<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        body {{
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f7;
            color: #1D1D1F;
        }}

        .container {{
            text-align: center;
            padding: 20px;
        }}

        h1 {{
            font-size: 6rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }}

        p {{
            font-size: 1.5rem;
            margin-bottom: 30px;
        }}

        a {{
            display: inline-block;
            padding: 15px 30px;
            background: #007AFF;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }}

        a:hover {{
            background: #5856D6;
            transform: translateY(-2px);
        }}
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>页面未找到</p>
        <a href="/">返回首页</a>
    </div>
</body>
</html>
