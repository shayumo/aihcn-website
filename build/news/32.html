    <!-- Worker API + localStorage备用方案 -->
    <script>
        const WORKER_API_URL = 'https://aihcn-website.workers.dev/api';

        // 获取用户ID
        function getUserId() {
            let userId = localStorage.getItem('aihcn_user_id');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('aihcn_user_id', userId);
            }
            return userId;
        }

        // 点赞功能
        async function handleLike() {
            const newsId = 32;
            const userId = getUserId();
            const button = document.querySelector('.like-button');
            const countEl = document.getElementById('like-count');
            const textEl = document.getElementById('like-text');

            try {
                button.disabled = true;
                textEl.textContent = '⏳...';

                const response = await fetch(`${WORKER_API_URL}/like`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        news_id: newsId,
                        user_id: userId
                    })
                });

                if (!response.ok) {
                    throw new Error(`API调用失败: ${response.status}`);
                }

                const data = await response.json();

                // 更新UI
                if (data.liked) {
                    button.classList.add('liked');
                    textEl.textContent = '已赞';
                } else {
                    button.classList.remove('liked');
                    textEl.textContent = '点赞';
                }

                countEl.textContent = data.count || 0;

            } catch (error) {
                console.error('API调用失败，降级到localStorage:', error);
                // 降级到localStorage
                fallbackToLocalLike(newsId, button, countEl, textEl);
            } finally {
                button.disabled = false;
            }
        }

        // 获取点赞数
        async function getLikeCount() {
            const newsId = 32;

            try {
                const response = await fetch(`${WORKER_API_URL}/like-count?news_id=${newsId}`);

                if (!response.ok) {
                    throw new Error(`获取点赞数失败: ${response.status}`);
                }

                const data = await response.json();
                return data.count || 0;
            } catch (error) {
                console.error('获取点赞数失败，使用localStorage:', error);
                return parseInt(localStorage.getItem(`news_like_${newsId}`) || '0');
            }
        }

        // 检查是否已点赞
        async function checkLike() {
            const newsId = 32;
            const userId = getUserId();

            try {
                const response = await fetch(`${WORKER_API_URL}/check-like?news_id=${newsId}&user_id=${userId}`);

                if (!response.ok) {
                    throw new Error(`检查点赞状态失败: ${response.status}`);
                }

                const data = await response.json();
                return data.liked;
            } catch (error) {
                console.error('检查点赞状态失败，使用localStorage:', error);
                return localStorage.getItem(`liked_news_${newsId}`) === 'true';
            }
        }

        // localStorage备用方案
        function fallbackToLocalLike(newsId, button, countEl, textEl) {
            const likes = JSON.parse(localStorage.getItem('ai_news_likes') || '{}');

            if (likes[newsId]) {
                likes[newsId]--;
                button.classList.remove('liked');
                textEl.textContent = '点赞';
            } else {
                likes[newsId] = (likes[newsId] || 0) + 1;
                button.classList.add('liked');
                textEl.textContent = '已赞';

                // 添加动画效果
                button.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    button.style.transform = 'scale(1)';
                }, 200);
            }

            localStorage.setItem('ai_news_likes', JSON.stringify(likes));
            countEl.textContent = likes[newsId];
        }

        // 复制链接
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert('链接已复制到剪贴板！');
            }).catch(err => {
                prompt('请复制链接:', url);
            });
        }

        // 页面加载时初始化
        async function initPage() {
            const button = document.querySelector('.like-button');
            const countEl = document.getElementById('like-count');
            const textEl = document.getElementById('like-text');

            try {
                // 并行获取点赞数和点赞状态
                const [count, isLiked] = await Promise.all([
                    getLikeCount(),
                    checkLike()
                ]);

                // 更新UI
                if (isLiked) {
                    button.classList.add('liked');
                    textEl.textContent = '已赞';
                }

                countEl.textContent = count || 0;

            } catch (error) {
                console.error('初始化页面失败，降级到localStorage:', error);
                // 降级到localStorage
                const likes = JSON.parse(localStorage.getItem('ai_news_likes') || '{}');
                const newsId = 32;
                if (likes[newsId] && likes[newsId] > 0) {
                    button.classList.add('liked');
                    textEl.textContent = '已赞';
                    countEl.textContent = likes[newsId];
                }
            }
        }

        // DOM加载完成后初始化
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
